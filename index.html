<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wesley Holley — Creative Director</title>
  <meta name="description" content="Portfolio of Wesley Holley, Creative Director." />
  <meta property="og:title" content="Wesley Holley — Creative Director" />
  <meta property="og:description" content="Portfolio of Wesley Holley, Creative Director." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,500;0,700;0,800;1,700;1,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0e0d;
      --bg-2: #15110f;
      --panel: #16191a;
      --text: #ffffff;
      --muted: #b9bdbb;
      --accent: #87ff87;
      --maxw: 1180px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

    .display {
      font-family: 'Saira Condensed', sans-serif;
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 0.92;
    }

    /* NAV */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      transition: background .3s, border-color .3s;
      border-bottom: 1px solid transparent;
    }
    header.scrolled {
      background: rgba(12,14,13,.82);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .nav { display: flex; align-items: center; justify-content: space-between; height: 70px; }
    .brand { font-family:'Saira Condensed',sans-serif; font-weight:800; font-style:italic; text-transform:uppercase; font-size: 20px; letter-spacing:.5px; }
    .brand span { color: var(--accent); }
    .nav-links { display: flex; gap: 30px; }
    .nav-links a { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); transition: color .2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-toggle { display:none; background:none; border:0; color:#fff; font-size:24px; cursor:pointer; }

    /* HERO */
    .hero {
      min-height: 100vh; display: flex; align-items: center; position: relative;
      background:
        radial-gradient(120% 90% at 50% 45%, #232525 0%, #131514 45%, #0a0b0a 100%);
    }
    .hero-inner { width: 100%; }
    .hero h1 { font-size: clamp(48px, 11vw, 132px); color: #fff; }
    .hero h1 .role { display:block; color: var(--accent); margin-left: clamp(20px, 9vw, 150px); margin-top: .04em; }
    .hero .tagline {
      position: absolute; right: 28px; bottom: 38px;
      font-family:'Saira Condensed',sans-serif; font-weight:800; font-style:italic;
      text-transform:uppercase; letter-spacing:1px; font-size: clamp(16px,2.4vw,26px);
    }
    .hero .tagline em { color: var(--accent); font-style: italic; }
    .scroll-hint { position:absolute; left:50%; bottom:30px; transform:translateX(-50%); color:var(--muted); font-size:11px; letter-spacing:2px; text-transform:uppercase; animation: bob 2s infinite; }
    @keyframes bob { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,7px)} }

    /* SECTION TITLE */
    .section { padding: 96px 0; }
    .sec-title { font-size: clamp(30px, 5vw, 52px); display: inline-block; padding-bottom: 10px; position: relative; }
    .sec-title::after { content:""; position:absolute; left:0; bottom:0; height:5px; width:100%; background: var(--accent); }

    /* ABOUT */
    #about { background: var(--bg); }
    .about-grid { display: grid; grid-template-columns: 1.4fr .8fr; gap: 56px; align-items: start; margin-top: 40px; }
    .about-text p { color: #d7dbd9; margin-bottom: 18px; max-width: 60ch; }
    .about-card { background: var(--panel); border:1px solid rgba(255,255,255,.07); border-radius: 14px; padding: 22px; text-align: center; position: sticky; top: 100px; }
    .about-card img { width: 100%; border-radius: 10px; filter: grayscale(100%); }
    .about-card .nm { font-family:'Saira Condensed',sans-serif; font-style:italic; font-weight:800; text-transform:uppercase; color: var(--accent); margin-top: 16px; font-size: 20px; }
    .about-card .rl { font-family:'Saira Condensed',sans-serif; font-style:italic; font-weight:700; text-transform:uppercase; color:#fff; font-size: 15px; letter-spacing:1px; }

    /* WORK */
    #work { background: linear-gradient(180deg, #0c0e0d, #0a0b0a); }
    .projects { display: flex; flex-direction: column; gap: 70px; margin-top: 48px; }
    .project { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s ease; }
    .project.in { opacity: 1; transform: none; }
    .project .head { display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; margin-bottom: 18px; }
    .project .pt { font-family:'Saira Condensed',sans-serif; font-weight:800; font-style:italic; text-transform:uppercase; font-size: clamp(22px,3vw,32px); }
    .project .pt::before { content:"›"; color: var(--accent); margin-right: 10px; }
    .project .pd { color: var(--muted); max-width: 70ch; }
    .project .frame { border-radius: 14px; overflow: hidden; border:1px solid rgba(255,255,255,.08); background:#fff; box-shadow: 0 18px 50px rgba(0,0,0,.45); }
    .project .frame img { width: 100%; }

    /* CONTACT */
    #contact { background: radial-gradient(120% 100% at 50% 0%, #1c1e1d 0%, #0c0e0d 60%); }
    .contact-grid { display:grid; grid-template-columns: 1fr auto; gap:48px; align-items:center; margin-top: 20px; }
    .contact h2 { font-size: clamp(34px,6vw,64px); color:#fff; }
    .contact h2 em { color: var(--accent); font-style: italic; }
    .contact .blurb { color: var(--muted); margin: 18px 0 28px; max-width: 48ch; font-size: 18px; }
    .btns { display:flex; flex-wrap:wrap; gap:14px; }
    .btn { display:inline-flex; align-items:center; gap:9px; padding: 13px 22px; border-radius: 999px; font-weight:600; font-size:14px; border:1px solid rgba(255,255,255,.18); transition: all .2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn.primary { background: var(--accent); color:#08130a; border-color: var(--accent); }
    .btn.primary:hover { box-shadow: 0 8px 26px rgba(135,255,135,.3); }
    .btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
    .contact-photo img { width: 200px; border-radius: 14px; filter: grayscale(100%); border:1px solid rgba(255,255,255,.1); }

    footer { border-top: 1px solid rgba(255,255,255,.08); padding: 30px 0; }
    .foot { display:flex; align-items:center; gap:18px; flex-wrap:wrap; justify-content:space-between; }
    .foot .who { font-family:'Saira Condensed',sans-serif; font-style:italic; font-weight:800; text-transform:uppercase; }
    .foot .who span { color: var(--accent); }
    .foot .meta { color: var(--muted); font-size: 14px; display:flex; gap:22px; flex-wrap:wrap; }
    .foot .meta a:hover { color: var(--accent); }

    @media (max-width: 860px) {
      .nav-links { position: fixed; inset: 70px 0 auto 0; background: rgba(12,14,13,.97); flex-direction: column; gap: 0; padding: 8px 0; transform: translateY(-120%); transition: transform .3s; border-bottom:1px solid rgba(255,255,255,.08); }
      .nav-links.open { transform: none; }
      .nav-links a { padding: 14px 28px; }
      .nav-toggle { display: block; }
      .about-grid { grid-template-columns: 1fr; }
      .about-card { position: static; max-width: 320px; }
      .contact-grid { grid-template-columns: 1fr; }
      .contact-photo { order:-1; }
    }
  </style>
</head>
<body>
  <header id="hdr">
    <div class="wrap nav">
      <a href="#top" class="brand" id="brand">WESLEY <span>HOLLEY</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
      <nav class="nav-links" id="navLinks">
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero" id="hero">
      <div class="wrap hero-inner">
        <h1 class="display" id="heroTitle"></h1>
      </div>
      <div class="tagline" id="heroTagline"></div>
      <div class="scroll-hint">scroll ↓</div>
    </section>

    <section class="section" id="work">
      <div class="wrap">
        <h2 class="sec-title display" id="workHeading">Selected Work</h2>
        <div class="projects" id="projects"></div>
      </div>
    </section>

    <section class="section" id="about">
      <div class="wrap">
        <h2 class="sec-title display" id="aboutHeading">About</h2>
        <div class="about-grid">
          <div class="about-text" id="aboutText"></div>
          <aside class="about-card">
            <img id="aboutPhoto" alt="Wesley Holley" />
            <div class="nm" id="aboutName"></div>
            <div class="rl" id="aboutRole"></div>
          </aside>
        </div>
      </div>
    </section>

    <section class="section" id="contact">
      <div class="wrap">
        <div class="contact-grid contact">
          <div>
            <h2 class="display" id="contactHeading"></h2>
            <p class="blurb" id="contactBlurb"></p>
            <div class="btns" id="contactBtns"></div>
          </div>
          <div class="contact-photo">
            <img id="contactPhoto" alt="Wesley Holley" />
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap foot">
      <div class="who" id="footWho">WESLEY <span>HOLLEY</span> — Creative Director</div>
      <div class="meta" id="footMeta"></div>
    </div>
  </footer>

  <script>
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    fetch('content.json?v=' + Date.now())
      .then(r => r.json())
      .then(render)
      .catch(err => { console.error(err); document.getElementById('projects').innerHTML = '<p style="color:#f88">Could not load content.json</p>'; });

    function render(d) {
      // meta
      if (d.site) {
        if (d.site.meta_title) document.title = d.site.meta_title;
        if (d.site.meta_description) {
          document.querySelector('meta[name=description]').setAttribute('content', d.site.meta_description);
        }
      }

      // hero
      const h = d.hero || {};
      document.getElementById('heroTitle').innerHTML =
        esc(h.first_name) + ' ' + esc(h.last_name) +
        '<span class="role">' + esc(h.role) + '</span>';
      const tl = (h.tagline || '').trim();
      // colour the last word (e.g. year) green
      const parts = tl.split(' ');
      let tlHtml = tl;
      if (parts.length > 1) { const last = parts.pop(); tlHtml = esc(parts.join(' ')) + ' <em>' + esc(last) + '</em>'; }
      else tlHtml = esc(tl);
      document.getElementById('heroTagline').innerHTML = tlHtml;
      document.getElementById('brand').innerHTML = esc(h.first_name) + ' <span>' + esc(h.last_name) + '</span>';
      document.getElementById('footWho').innerHTML = esc(h.first_name) + ' <span>' + esc(h.last_name) + '</span> — ' + esc(titleCase(h.role));

      // work
      if (d.work_heading) document.getElementById('workHeading').textContent = d.work_heading;
      const pc = document.getElementById('projects');
      pc.innerHTML = (d.projects || []).map(p => `
        <article class="project">
          <div class="head">
            <h3 class="pt">${esc(p.title)}</h3>
          </div>
          <p class="pd">${esc(p.description)}</p>
          ${p.image ? `<div class="frame"><img loading="lazy" src="${esc(p.image)}" alt="${esc(p.title)}" /></div>` : ''}
        </article>`).join('');

      // about
      const a = d.about || {};
      if (a.heading) document.getElementById('aboutHeading').textContent = a.heading;
      document.getElementById('aboutText').innerHTML = (a.paragraphs || []).map(t => `<p>${esc(t)}</p>`).join('');
      if (a.headshot) { document.getElementById('aboutPhoto').src = a.headshot; document.getElementById('contactPhoto').src = a.headshot; }
      document.getElementById('aboutName').textContent = a.name_label || '';
      document.getElementById('aboutRole').textContent = a.role_label || '';

      // contact
      const c = d.contact || {};
      const ch = (c.heading || '');
      const cparts = ch.split(' ');
      let chHtml = esc(ch);
      if (cparts.length > 1) { const last = cparts.pop(); chHtml = esc(cparts.join(' ')) + ' <em>' + esc(last) + '</em>'; }
      document.getElementById('contactHeading').innerHTML = chHtml;
      document.getElementById('contactBlurb').textContent = c.blurb || '';
      const btns = [];
      if (c.email) btns.push(`<a class="btn primary" href="mailto:${esc(c.email)}">✉ Email me</a>`);
      if (c.phone) btns.push(`<a class="btn ghost" href="tel:${esc(c.phone.replace(/[^0-9+]/g,''))}">${esc(c.phone)}</a>`);
      if (c.linkedin_url) btns.push(`<a class="btn ghost" target="_blank" rel="noopener" href="${esc(c.linkedin_url)}">in &nbsp;LinkedIn</a>`);
      document.getElementById('contactBtns').innerHTML = btns.join('');

      const meta = [];
      if (c.email) meta.push(`<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`);
      if (c.phone) meta.push(`<a href="tel:${esc(c.phone.replace(/[^0-9+]/g,''))}">${esc(c.phone)}</a>`);
      if (c.linkedin_url) meta.push(`<a target="_blank" rel="noopener" href="${esc(c.linkedin_url)}">LinkedIn</a>`);
      document.getElementById('footMeta').innerHTML = meta.join('');

      // reveal-on-scroll
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: 0.12 });
      document.querySelectorAll('.project').forEach(el => io.observe(el));
    }

    function titleCase(s){ return (s||'').toLowerCase().replace(/\b\w/g, m => m.toUpperCase()); }

    // nav behaviour
    const hdr = document.getElementById('hdr');
    addEventListener('scroll', () => hdr.classList.toggle('scrolled', scrollY > 40));
    const links = document.getElementById('navLinks');
    document.getElementById('navToggle').addEventListener('click', () => links.classList.toggle('open'));
    links.addEventListener('click', e => { if (e.target.tagName === 'A') links.classList.remove('open'); });
  </script>
</body>
</html>
